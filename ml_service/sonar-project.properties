sonar.projectKey=expense-ml
sonar.projectName=Expense ML Service
sonar.projectVersion=1.0

sonar.sources=.
sonar.inclusions=**/*.py
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/tests/**,**/.pytest_cache/**

sonar.tests=tests
sonar.test.inclusions=**/test_*.py,**/*_test.py

sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.11

sonar.sourceEncoding=UTF-8